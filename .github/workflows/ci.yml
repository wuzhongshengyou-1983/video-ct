# =============================================================================
# Video CT · CI 流水线
# 触发: push 到 main/develop, PR 到 main
# Job 依赖链:
#   backend-lint ──┐
#   alembic-check ─┼→ test-backend → test-e2e
#   frontend-check ┘
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:

  # ===================== 后端 Lint =====================
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt
      - run: pip install ruff
      - run: python -m ruff check app/

  # ===================== Alembic 迁移校验（新增）=====================
  alembic-check:
    name: Alembic Migration Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: video_ct
          POSTGRES_PASSWORD: video_ct_test
          POSTGRES_DB: video_ct_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements-alembic.txt
      - run: pip install -r requirements-alembic.txt
      - name: Init base schema
        env:
          PGPASSWORD: video_ct_test
        run: psql -h localhost -U video_ct -d video_ct_test -f ../../infra/migrations/init_schema.sql
      - name: Run all migrations
        env:
          DATABASE_URL: postgresql+asyncpg://video_ct:video_ct_test@localhost:5432/video_ct_test
        run: alembic upgrade head
      - name: Verify no pending model changes
        env:
          DATABASE_URL: postgresql+asyncpg://video_ct:video_ct_test@localhost:5432/video_ct_test
        continue-on-error: true
        run: |
          alembic check && echo "✅ 无待执行迁移" \
            || echo "⚠️ 存在未生成迁移脚本的 Model 变更（非阻塞，请本地运行 alembic revision --autogenerate）"

  # ===================== 前端类型检查（矩阵，3端并行）=====================
  frontend-typecheck:
    name: TypeCheck (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [h5, admin, consultant]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Get pnpm store
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ matrix.app }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-${{ matrix.app }}-
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - run: pnpm typecheck
        continue-on-error: true

  # ===================== 后端测试 =====================
  test-backend:
    name: Backend Test (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint, alembic-check]
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: video_ct
          POSTGRES_PASSWORD: video_ct_test
          POSTGRES_DB: video_ct_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://video_ct:video_ct_test@localhost:5432/video_ct_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci-only
        run: python -m pytest tests/ -v --tb=short

  # ===================== E2E 测试（软性）=====================
  test-e2e:
    name: E2E Test (Playwright · 软性)
    runs-on: ubuntu-latest
    needs: [test-backend]
    # TODO: 接入 docker-compose 启动全套服务后移除 continue-on-error
    continue-on-error: true
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        env:
          API_URL: http://localhost:8000
          H5_URL: http://localhost:5173
        run: npx playwright test --project=chromium

  # ===================== Danger JS · PR 规范检查 =====================
  danger:
    name: Danger JS (PR Rules)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run Danger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ===================== Phase Gate 状态输出 =====================
  phase-gate-status:
    name: Phase Gate Status
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r services/api/requirements.txt
      - name: Check phase gate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/check-phase-gate.py --json
