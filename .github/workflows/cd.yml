# =============================================================================
# Video CT · CD 流水线
# 触发: push tag v* (如 v0.3.0)
# Job 链: build-push → migrate → deploy → health-check
#
# 所需 GitHub Secrets（在 Settings → Secrets → Actions 配置）:
#   DEPLOY_HOST     — ECS 公网 IP（如 150.158.20.173）
#   DEPLOY_USER     — SSH 用户（如 ubuntu）
#   DEPLOY_SSH_KEY  — SSH 私钥（PEM 格式）
#   DEPLOY_PATH     — 部署目录（如 /opt/video-ct）
# =============================================================================

name: CD

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:

  # ===================== 构建 + 推送镜像到 GHCR =====================
  build-push:
    name: Build & Push (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: api
            dockerfile: infra/docker/Dockerfile.api
          - target: h5
            dockerfile: infra/docker/Dockerfile.h5
          - target: admin
            dockerfile: infra/docker/Dockerfile.admin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===================== 数据库迁移 =====================
  migrate:
    name: DB Migration (alembic upgrade head)
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Run alembic upgrade head on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo "▶ 拉取最新镜像..."
            docker compose pull api
            echo "▶ 执行数据库迁移..."
            docker compose run --rm api alembic upgrade head
            echo "✅ 迁移完成"

  # ===================== 滚动部署 =====================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: migrate
    environment:
      name: production
      url: https://openo.vip
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "▶ 拉取全部最新镜像..."
            docker compose pull

            echo "▶ 滚动重启服务（zero-downtime）..."
            docker compose up -d --remove-orphans

            echo "▶ 清理旧镜像..."
            docker image prune -f

            echo "✅ 部署完成 — $(date '+%Y-%m-%d %H:%M:%S CST')"

  # ===================== 部署后健康检查 =====================
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for service to be ready (30s)
        run: sleep 30

      - name: Check /healthz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://openo.vip/healthz)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /healthz 返回 $STATUS，部署可能失败"
            exit 1
          fi
          echo "✅ /healthz → 200"

      - name: Check /readyz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://openo.vip/readyz)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /readyz 返回 $STATUS（DB 或 Redis 可能未就绪）"
            exit 1
          fi
          echo "✅ /readyz → 200"

      - name: Notify deploy success
        if: success()
        run: |
          echo "🚀 Video CT ${{ github.ref_name }} 部署成功"
          echo "   时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "   镜像: ghcr.io/${{ github.repository }}-api:${{ github.ref_name }}"

      - name: Notify deploy failure
        if: failure()
        run: |
          echo "🔴 Video CT ${{ github.ref_name }} 健康检查失败，请立即检查服务日志"
          echo "   ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          echo "   cd ${{ secrets.DEPLOY_PATH }} && docker compose logs --tail=50 api"
          exit 1
