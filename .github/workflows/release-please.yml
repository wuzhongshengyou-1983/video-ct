name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 版本发布后：归档旧版文档、生成新版模板
  scaffold-docs:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Archive previous version docs + scaffold new
        env:
          NEW_VERSION: ${{ needs.release-please.outputs.version }}
        run: bash scripts/version-doc-scaffold.sh "$NEW_VERSION"
      - name: Commit doc scaffold
        run: |
          git config user.name "release-bot"
          git config user.email "noreply@github.com"
          git add docs/
          git diff --staged --quiet || \
            git commit -m "docs: scaffold v${{ needs.release-please.outputs.version }} and archive previous"
          git push
