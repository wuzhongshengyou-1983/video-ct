version: 2
updates:
  # pnpm 前端依赖（根工作区）
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      vite-ecosystem:
        patterns: ["vite", "@vitejs/*", "vitepress"]
      vue-ecosystem:
        patterns: ["vue", "@vue/*", "pinia", "vue-router"]
      dev-tooling:
        patterns: ["eslint*", "typescript", "@typescript-eslint/*", "prettier"]
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"

  # pip 后端依赖
  - package-ecosystem: pip
    directory: "/services/api"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      fastapi-ecosystem:
        patterns: ["fastapi", "uvicorn", "pydantic*", "starlette"]
      ai-libs:
        patterns: ["openai", "langchain*", "langgraph"]
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions 自身版本更新
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
