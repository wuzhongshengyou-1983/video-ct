# =============================================================================
# Video CT · Nginx 配置 · SPA 路由回退 + API 代理 + gzip + 安全头
# =============================================================================

# --------------------------- 上游服务定义 ---------------------------
upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream h5_frontend {
    server h5:80;
    keepalive 32;
}

upstream admin_frontend {
    server admin:80;
    keepalive 32;
}

# --------------------------- HTTP Server ---------------------------
server {
    listen 80;
    server_name _;

    # 客户端上传大小限制
    client_max_body_size 200m;
    client_body_buffer_size 128k;

    # ===================== gzip 压缩 =====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        font/truetype
        font/opentype
        image/svg+xml;

    # ===================== 安全头 =====================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy（如果不需要第三方脚本，保持严格）
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.byteimg.com; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: blob: https:; "
        "font-src 'self' data:; "
        "connect-src 'self' https:; "
        "frame-ancestors 'none';"
        always;

    # ===================== SPA 路由回退 =====================
    # 根路径 → H5 C 端
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 管理后台 B 端
    location /admin/ {
        # 如果 admin 是独立部署：alias + SPA 回退
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 顾问后台
    location /consultant/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /consultant/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ===================== API 代理 =====================
    location /api/ {
        proxy_pass http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（AI 诊断可能耗时较长）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # 跨域透传
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Request-ID" always;

        # OPTIONS 预检
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    # ===================== 健康检查（不记录日志） =====================
    location /nginx-healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
