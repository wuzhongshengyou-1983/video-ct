# =============================================================================
# Video CT · Prometheus 监控配置
# 使用说明: prometheus --config.file=infra/monitoring/prometheus.yml
# =============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

  external_labels:
    app: video-ct
    env: production

# --------------------------- 告警规则 ---------------------------
rule_files:
  - "alerts.yml"

# --------------------------- 抓取目标 ---------------------------
scrape_configs:
  # 后端 API 指标（/metrics 端点由 prometheus-fastapi-instrumentator 暴露）
  - job_name: video-ct-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - "api:8000"
        labels:
          service: api
          component: backend

  # Prometheus 自身指标
  - job_name: prometheus
    static_configs:
      - targets:
          - "localhost:9090"

  # ===================== 未来扩展 =====================
