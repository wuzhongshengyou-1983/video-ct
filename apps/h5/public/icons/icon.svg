<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 深色背景 -->
  <rect width="512" height="512" rx="80" fill="#0a0e1a"/>
  <!-- 琥珀色外圈 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#f59e0b" stroke-width="12" opacity="0.3"/>
  <!-- 中心 CT 文字 -->
  <text x="256" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="160" font-weight="900" fill="#f59e0b" letter-spacing="8">CT</text>
  <!-- 底部装饰线 -->
  <rect x="128" y="340" width="256" height="6" rx="3" fill="#f59e0b" opacity="0.5"/>
  <!-- 顶部十字准星 -->
  <circle cx="256" cy="120" r="8" fill="#38bdf8"/>
  <line x1="256" y1="80" x2="256" y2="160" stroke="#38bdf8" stroke-width="3" opacity="0.4"/>
  <line x1="216" y1="120" x2="296" y2="120" stroke="#38bdf8" stroke-width="3" opacity="0.4"/>
</svg>
